<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Crown/Editorial symbol -->
  <g fill="#000000">
    <!-- Left peak -->
    <polygon points="30,45 40,25 45,45"/>
    <!-- Center peak -->
    <polygon points="75,40 90,15 105,40"/>
    <!-- Right peak -->
    <polygon points="155,45 160,25 170,45"/>
    <!-- Base line -->
    <rect x="25" y="48" width="150" height="3" fill="#000000"/>
  </g>
  
  <!-- "TWELVE LORDS" text -->
  <text x="100" y="68" font-family="Georgia, serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000000" letter-spacing="2">TWELVE LORDS</text>
</svg>
